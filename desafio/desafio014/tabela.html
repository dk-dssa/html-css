<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Notas</title>
    <style>
    table{
        border-collapse: collapse;
        
    }
    td, th{
        border: 1px solid black;
        padding: 10px;
        font-family: Arial, Helvetica, sans-serif;
    
    }
    th{
        background-color: rgb(102, 102, 102);
        color: white;
    }
    .cor{
        background-color: rgb(252, 252, 252);
        color: black;
    }
    .esquerda{
        text-align: left;
    }
    
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th colspan="1" rowspan="4">Área</th>
                <th colspan="1"rowspan="4">Diciplinas</th>
                <th colspan="2">Notas</th>
                <th colspan="1"rowspan="4">Médias</th>
            </tr>
            <tr>
                <th>Nota 1</th>
                <th>Nota 2</th>
                
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup" class="cor">Exatas</th>
                <td>Matemática</td>
                 <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
               
            </tr>
            <tr> 
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
               
            </tr>
            <tr>
                <th colspan="4" scope="rowgroup" class="esquerda">Média de Exatas</th>
                <th>0.0</th>
            </tr>
                <th rowspan="2" class="cor">Humanas</th>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th colspan="4" scope="rowgroup" class="esquerda">Média de Humanas</th>
                <th>0.0</th>
            </tr>
            
            


        </tbody>
        
    </table>

</body>
</html>
