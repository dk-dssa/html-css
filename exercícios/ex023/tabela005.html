
<!DOCTYPE html>

<head>

    <title>Exercício de tabelas</title>
    <style>
         body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        
        }
        caption{
            font-size: 1.3em;
            font-weight: bold;
            padding: 8px;
        }
        th, td{
            border: 1px solid rgb(95, 94, 94);
            padding: 8px;
            
         }
    </style>
</head>
